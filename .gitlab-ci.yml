# GitLab CI/CD configuration for bnel-mef3-server
# Builds and publishes Docker images to GitLab Container Registry

stages:
  - test
  - build
  - release

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # GitLab automatically provides CI_REGISTRY, CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD

# Run tests before building
test:
  stage: test
  image: python:3.12
  before_script:
    - pip install --no-cache-dir -e ".[test]"
  script:
    - python -m pytest tests/ -v --tb=short
  only:
    - branches
    - tags
    - merge_requests

# Build Docker image for branches (development)
build:dev:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=$CI_COMMIT_SHORT_SHA \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        -f Dockerfile .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - branches
  except:
    - main

# Build and tag as latest for main branch
build:main:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=$CI_COMMIT_SHORT_SHA \
        -t $CI_REGISTRY_IMAGE:latest \
        -t $CI_REGISTRY_IMAGE:main \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        -f Dockerfile .
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:main
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main

# Build and publish release for tags
build:release:
  stage: release
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      # Extract version from tag (assumes tags like v1.0.0)
      VERSION=${CI_COMMIT_TAG#v}
      MAJOR=$(echo $VERSION | cut -d. -f1)
      MINOR=$(echo $VERSION | cut -d. -f1-2)
      
      docker build \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=$CI_COMMIT_SHORT_SHA \
        --build-arg VERSION=$VERSION \
        -t $CI_REGISTRY_IMAGE:$VERSION \
        -t $CI_REGISTRY_IMAGE:$MINOR \
        -t $CI_REGISTRY_IMAGE:$MAJOR \
        -t $CI_REGISTRY_IMAGE:latest \
        -f Dockerfile .
      
      docker push $CI_REGISTRY_IMAGE:$VERSION
      docker push $CI_REGISTRY_IMAGE:$MINOR
      docker push $CI_REGISTRY_IMAGE:$MAJOR
      docker push $CI_REGISTRY_IMAGE:latest
  only:
    - tags
  except:
    - branches
