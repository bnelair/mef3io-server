name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest~=8.4.2 pytest-order pytest-benchmark tqdm build
      - name: Run tests
        run: pytest -q -m "not slow and not benchmark"

      - name: Build distribution artifacts
        run: python -m build
